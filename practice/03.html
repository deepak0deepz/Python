<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
</head>
<body style="text-align:center; background:#eee; font-family:serif;">
    <br><br><hr>

<h1>Forgot Password</h1>

<form>

<label>Enter your email:</label><br>
<input type="email" placeholder="Enter registered email"><br><br>

<label>Enter your phone:</label><br>
<input type="text" placeholder="Enter registered phone"><br><br>

<label>Enter your password:</label><br>
<input type="password" placeholder="Enter password"><br><br>

<label>Enter your confirm password:</label><br>
<input type="password" placeholder="Enter confirm password"><br><br>

<button type="submit">Reset Password</button>

</form>
<hr>
</body>
</html>
