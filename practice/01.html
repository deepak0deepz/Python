<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>
</head>
<body style="text-align:center; background:#eee; font-family:serif;">
    <br><br><hr>

<h1>Contact Us</h1>

<form>
<label>Full Name:</label><br>
<input type="text" placeholder="Enter your name"><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter your email"><br><br>

<label>Subject:</label><br>
<input type="text" placeholder="Enter subject"><br><br>

<label>Message:</label><br>
<textarea rows="6" cols="30" placeholder="Enter your message"></textarea><br><br>

<button type="submit">Submit</button>
</form>
<hr>

</body>
</html>
